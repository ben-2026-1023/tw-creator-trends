<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TW Creator Trends</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030712;--surface:#0a0f1e;--surface2:#0f1629;
  --accent:#00f5ff;--accent2:#7c3aed;--accent3:#f59e0b;
  --text:#e2e8f0;--muted:#64748b;--border:#1e293b;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.app{position:relative;z-index:1}

/* Welcome */
#s1{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
.logo{font-family:'Orbitron',sans-serif;font-size:clamp(1.5rem,4vw,2.8rem);font-weight:900;letter-spacing:0.1em;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem}
.sub{color:var(--muted);font-size:0.85rem;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:3rem}
.scan{width:100%;max-width:400px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:0 auto 2rem;animation:scan 2s infinite}
@keyframes scan{0%,100%{opacity:0.3}50%{opacity:1}}
.cyber-input{width:100%;max-width:400px;padding:1rem 1.5rem;background:rgba(0,245,255,0.05);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-size:1rem;outline:none;margin-bottom:1rem;font-family:'Noto Sans TC',sans-serif}
.cyber-input::placeholder{color:var(--muted)}
.cyber-btn{width:100%;max-width:400px;padding:1rem;background:transparent;border:1px solid var(--accent);border-radius:4px;color:var(--accent);font-family:'Orbitron',sans-serif;font-size:0.85rem;letter-spacing:0.2em;cursor:pointer;transition:all 0.3s}
.cyber-btn:hover{background:rgba(0,245,255,0.1);box-shadow:0 0 30px rgba(0,245,255,0.3)}

/* Platform */
#s2{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.5rem;width:100%;max-width:650px;margin-top:2rem}
.pcard{padding:2rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;transition:all 0.3s;text-align:center}
.pcard:hover{transform:translateY(-4px)}
.pcard.ig:hover{border-color:#e1306c;box-shadow:0 0 30px rgba(225,48,108,0.3)}
.pcard.tt:hover{border-color:#ff0050;box-shadow:0 0 30px rgba(255,0,80,0.3)}
.pcard.th:hover{border-color:#888;box-shadow:0 0 20px rgba(255,255,255,0.1)}
.picon{font-size:2.5rem;margin-bottom:1rem}
.pname{font-size:1.1rem;font-weight:500;margin-bottom:0.5rem}
.ptag{font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:0.2em;color:var(--muted)}
.pcount{margin-top:1rem;font-size:0.75rem;color:var(--muted)}

/* Dashboard */
#s3{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:rgba(10,15,30,0.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.4rem 1rem;border-radius:4px;cursor:pointer;font-size:0.8rem;transition:all 0.2s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.ttitle{font-family:'Orbitron',sans-serif;font-size:0.85rem;letter-spacing:0.15em;margin-left:1rem}
.live{display:flex;align-items:center;gap:0.5rem;background:rgba(0,245,255,0.1);border:1px solid var(--accent);padding:0.25rem 0.75rem;border-radius:20px;font-size:0.75rem;color:var(--accent)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.clock{font-family:'Orbitron',sans-serif;font-size:0.8rem;color:var(--muted);margin-left:1rem}

.tabs{display:flex;gap:0.5rem;padding:1rem 2rem;border-bottom:1px solid var(--border)}
.tab{padding:0.4rem 1.2rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:0.85rem;transition:all 0.2s;font-family:'Noto Sans TC',sans-serif}
.tab.aig{background:rgba(225,48,108,0.15);border-color:#e1306c;color:#e1306c}
.tab.att{background:rgba(255,0,80,0.15);border-color:#ff0050;color:#ff0050}
.tab.ath{background:rgba(255,255,255,0.05);border-color:#888;color:#ccc}

.body{display:flex;flex:1}
.rank-panel{flex:1;padding:1.5rem 2rem;overflow-y:auto}
.kw-panel{width:260px;border-left:1px solid var(--border);padding:1.5rem;background:var(--surface);overflow-y:auto}

.stitle{font-family:'Orbitron',sans-serif;font-size:0.7rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

.tnav{display:flex;gap:0.5rem;margin-bottom:1.5rem;overflow-x:auto;padding-bottom:0.5rem}
.tbtn{padding:0.35rem 0.9rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.78rem;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.tbtn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,245,255,0.1)}

.vcard{display:flex;align-items:center;gap:1rem;padding:0.9rem;border:1px solid var(--border);border-radius:6px;background:var(--surface);margin-bottom:0.65rem;transition:all 0.2s;text-decoration:none;color:inherit;cursor:pointer}
.vcard:hover{border-color:var(--accent);background:var(--surface2);transform:translateX(3px)}
.rank{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;min-width:36px;text-align:center}
.r1{color:var(--accent3)}.r2{color:#94a3b8}.r3{color:#b45309}.ro{color:var(--muted);font-size:0.85rem}
.thumb{width:54px;height:72px;border-radius:4px;background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.vinfo{flex:1;min-width:0}
.vacct{font-size:0.9rem;font-weight:500;color:var(--accent);margin-bottom:0.2rem}
.vcap{font-size:0.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:0.3rem}
.vstats{display:flex;gap:0.8rem;font-size:0.72rem;color:var(--muted)}
.vlink{font-size:0.72rem;color:var(--accent);border:1px solid rgba(0,245,255,0.3);padding:0.2rem 0.5rem;border-radius:4px;white-space:nowrap;flex-shrink:0;transition:all 0.2s}
.vlink:hover{background:rgba(0,245,255,0.1)}

.kwitem{padding:0.5rem 0;border-bottom:1px solid var(--border)}
.kwrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.2rem}
.kwtext{font-size:0.82rem}
.kwcount{font-family:'Orbitron',sans-serif;font-size:0.68rem;color:var(--accent)}
.kwbar{height:2px;background:rgba(0,245,255,0.15);border-radius:1px}
.kwfill{height:100%;background:var(--accent);border-radius:1px;transition:width 0.5s}

.loading{text-align:center;padding:3rem;font-family:'Orbitron',sans-serif;font-size:0.8rem;color:var(--accent);letter-spacing:0.2em;animation:pulse 1.5s infinite}
.empty{text-align:center;padding:3rem;color:var(--muted)}

@media(max-width:600px){.kw-panel{display:none}.topbar{padding:1rem}.rank-panel{padding:1rem}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="app">

<div id="s1">
  <div class="logo">TW CREATOR TRENDS</div>
  <div class="sub">台灣短影音熱門趨勢平台</div>
  <div class="scan"></div>
  <input class="cyber-input" id="uinput" placeholder="輸入你的創作者代號..." autocomplete="off">
  <button class="cyber-btn" onclick="goS2()">進入系統 →</button>
</div>

<div id="s2">
  <div class="logo" style="font-size:1.5rem;margin-bottom:0.5rem">選擇平台</div>
  <div style="color:var(--muted);font-size:0.85rem">歡迎，<span id="uname" style="color:var(--accent)"></span></div>
  <div class="pgrid">
    <div class="pcard ig" onclick="goS3('instagram')">
      <div class="picon">📸</div>
      <div class="pname">Instagram</div>
      <div class="ptag">REELS 熱門榜</div>
      <div class="pcount" id="igcount">載入中...</div>
    </div>
    <div class="pcard tt" onclick="alert('即將上線！')">
      <div class="picon">🎵</div>
      <div class="pname">TikTok</div>
      <div class="ptag">FOR YOU 榜</div>
      <div class="pcount">即將上線</div>
    </div>
    <div class="pcard th" onclick="alert('即將上線！')">
      <div class="picon">🧵</div>
      <div class="pname">Threads</div>
      <div class="ptag">熱門話題榜</div>
      <div class="pcount">即將上線</div>
    </div>
  </div>
</div>

<div id="s3">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <button class="back-btn" onclick="goBack()">← 返回</button>
      <div class="ttitle" id="ttitle">INSTAGRAM REELS</div>
    </div>
    <div style="display:flex;align-items:center">
      <div class="live"><div class="ldot"></div>LIVE</div>
      <div class="clock" id="clock"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab aig" id="tab-instagram" onclick="switchTab('instagram')">📸 Instagram</button>
    <button class="tab" id="tab-tiktok" onclick="alert('即將上線！')">🎵 TikTok</button>
    <button class="tab" id="tab-threads" onclick="alert('即將上線！')">🧵 Threads</button>
  </div>
  <div class="body">
    <div class="rank-panel">
      <div class="tnav" id="tnav"></div>
      <div class="stitle" id="rtitle">即時熱門榜 TOP 50</div>
      <div id="vlist"><div class="loading">載入資料中...</div></div>
    </div>
    <div class="kw-panel">
      <div class="stitle">熱門關鍵詞</div>
      <div id="kwlist"><div class="loading" style="font-size:0.7rem">載入中...</div></div>
    </div>
  </div>
</div>

</div>

<script>
const SB_URL='https://uxpbbcbclkragxbvkkze.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4cGJiY2JjbGtyYWd4YnZra3plIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyODY4NjksImV4cCI6MjA5Mjg2Mjg2OX0.ciZaeMtaDv_vpMRHN0SgEzLsWi-4AT-sS7leolQYC1w';
let curPlat='instagram';

async function sbq(table,params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  return r.json();
}

function goS2(){
  const v=document.getElementById('uinput').value.trim();
  if(!v){document.getElementById('uinput').focus();return}
  document.getElementById('uname').textContent=v;
  document.getElementById('s1').style.display='none';
  document.getElementById('s2').style.display='flex';
  sbq('videos','select=platform&platform=eq.instagram').then(d=>{
    document.getElementById('igcount').textContent=Array.isArray(d)?`已收錄 ${d.length} 支影片`:'';
  });
}

document.getElementById('uinput').addEventListener('keydown',e=>{if(e.key==='Enter')goS2()});

function goS3(p){
  curPlat=p;
  document.getElementById('s2').style.display='none';
  document.getElementById('s3').style.display='flex';
  buildTimeNav();
  loadDash(p);
}

function goBack(){
  document.getElementById('s3').style.display='none';
  document.getElementById('s2').style.display='flex';
}

function switchTab(p){
  curPlat=p;
  document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  document.getElementById('tab-'+p).className='tab a'+p;
  loadDash(p);
}

function buildTimeNav(){
  const nav=document.getElementById('tnav');
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().split('T')[0]);}
  nav.innerHTML=dates.map((d,i)=>`<button class="tbtn${i===0?' active':''}" onclick="loadDate('${d}',this)">${i===0?'今日':d.slice(5)}</button>`).join('');
}

async function loadDate(date,btn){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const isToday=date===new Date().toISOString().split('T')[0];
  document.getElementById('rtitle').textContent=isToday?'即時熱門榜 TOP 50':`${date} 日榜 TOP 10`;
  await loadVideos(curPlat,date,isToday?50:10);
}

async function loadDash(p){
  const today=new Date().toISOString().split('T')[0];
  await loadVideos(p,today,50);
  loadKw(p,today);
}

async function loadVideos(p,date,limit){
  document.getElementById('vlist').innerHTML='<div class="loading">載入資料中...</div>';
  const data=await sbq('videos',`select=*&platform=eq.${p}&fetch_date=eq.${date}&limit=${limit}&order=fetched_at.desc`);
  const el=document.getElementById('vlist');
  if(!Array.isArray(data)||!data.length){
    el.innerHTML='<div class="empty">📭 此日期尚無資料<br><small style="margin-top:0.5rem;display:block">請先執行爬蟲</small></div>';
    return;
  }
  el.innerHTML=data.map((v,i)=>{
    const r=i+1;
    const rc=r===1?'r1':r===2?'r2':r===3?'r3':'ro';
    const ri=r<=3?['🥇','🥈','🥉'][r-1]:r;
    const tags=v.hashtags&&v.hashtags.length?v.hashtags.slice(0,3).map(t=>`<span style="color:var(--accent2);font-size:0.7rem">#${t.replace('#','')}</span>`).join(' '):'';
    return `<div class="vcard" onclick="window.open('${v.video_url}','_blank')">
      <div class="rank ${rc}">${ri}</div>
      <div class="thumb">🎬</div>
      <div class="vinfo">
        <div class="vacct">${v.account_name||'@unknown'}</div>
        <div class="vcap">${v.caption||'（無說明文字）'}</div>
        <div style="margin-bottom:0.2rem">${tags}</div>
        <div class="vstats"><span>👁 ${v.views||'-'}</span><span>❤️ ${v.likes||'-'}</span><span>💬 ${v.comments||'-'}</span></div>
      </div>
      <div class="vlink">觀看 →</div>
    </div>`;
  }).join('');
}

async function loadKw(p,date){
  const data=await sbq('keyword_stats',`select=*&platform=eq.${p}&date=eq.${date}&order=count.desc&limit=20`);
  const el=document.getElementById('kwlist');
  if(!Array.isArray(data)||!data.length){el.innerHTML='<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:2rem">尚無關鍵詞資料</div>';return;}
  const max=data[0].count;
  el.innerHTML=data.map(k=>`<div class="kwitem"><div class="kwrow"><span class="kwtext">#${k.keyword}</span><span class="kwcount">${k.count}</span></div><div class="kwbar"><div class="kwfill" style="width:${Math.round(k.count/max*100)}%"></div></div></div>`).join('');
}

setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false})},1000);

// Background
const cv=document.getElementById('bg'),cx=cv.getContext('2d');
let W,H,stars=[],ang=0;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;stars=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2,o:Math.random()}))}
resize();window.addEventListener('resize',resize);
function drawBg(){
  cx.clearRect(0,0,W,H);cx.fillStyle='#030712';cx.fillRect(0,0,W,H);
  stars.forEach(s=>{cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(226,232,240,${s.o*0.5})`;cx.fill()});
  ang+=0.002;
  const gx=W*0.75,gy=H*0.6,gr=Math.min(W,H)*0.28;
  const g=cx.createRadialGradient(gx-gr*0.3,gy-gr*0.3,gr*0.1,gx,gy,gr);
  g.addColorStop(0,'rgba(0,245,255,0.12)');g.addColorStop(0.5,'rgba(124,58,237,0.06)');g.addColorStop(1,'rgba(0,0,0,0)');
  cx.beginPath();cx.arc(gx,gy,gr,0,Math.PI*2);cx.fillStyle=g;cx.fill();
  cx.strokeStyle='rgba(0,245,255,0.06)';cx.lineWidth=1;
  for(let i=0;i<5;i++){const a=ang+i*Math.PI/2.5;cx.beginPath();cx.arc(gx,gy,gr*(0.4+i*0.13),a,a+Math.PI*1.5);cx.stroke()}
  requestAnimationFrame(drawBg);
}
drawBg();
</script>
</body>
</html>
